---
# OpenRewrite migration recipes for the MCP Java SDK 1.1 release.
#
# These recipes automate migrating user code that depended on the nested types
# inside McpSchema (pre-1.1) to the new top-level classes introduced in 1.1.
#
# Usage (Maven):
#
#   mvn org.openrewrite.maven:rewrite-maven-plugin:run \
#       -Drewrite.recipeArtifactCoordinates=io.modelcontextprotocol.sdk:mcp-migrate:LATEST \
#       -Drewrite.activeRecipes=io.modelcontextprotocol.sdk.migrations.McpSchemaMigration
#
# Usage (Gradle):
#
#   rewrite {
#     activeRecipe("io.modelcontextprotocol.sdk.migrations.McpSchemaMigration")
#     setRecipeArtifactCoordinates("io.modelcontextprotocol.sdk:mcp-migrate:LATEST")
#   }

type: specs.openrewrite.org/v1beta/recipe
name: io.modelcontextprotocol.sdk.migrations.McpSchemaMigration
displayName: Migrate McpSchema nested types to top-level package classes (MCP SDK 1.1)
description: >
  In MCP SDK 1.1 the large McpSchema class was decomposed. All domain types that
  were previously defined as nested classes/records inside McpSchema were extracted
  into dedicated top-level classes in feature-specific sub-packages under
  io.modelcontextprotocol.spec. This recipe updates all import statements and
  type references so that user code compiles against the new structure.
tags:
  - mcp
  - migration
  - breaking-change
recipeList:
  - io.modelcontextprotocol.sdk.migrations.MigrateJsonRpcTypes
  - io.modelcontextprotocol.sdk.migrations.MigrateResourceTypes
  - io.modelcontextprotocol.sdk.migrations.MigratePromptTypes
  - io.modelcontextprotocol.sdk.migrations.MigrateToolTypes
  - io.modelcontextprotocol.sdk.migrations.MigrateSamplingTypes
  - io.modelcontextprotocol.sdk.migrations.MigrateElicitTypes
  - io.modelcontextprotocol.sdk.migrations.MigrateStaticMembers

---
# ---------------------------------------------------------------------------
# JSON-RPC types
# Previously:  McpSchema.JSONRPCMessage / JSONRPCRequest / JSONRPCNotification
#              / JSONRPCResponse / JSONRPCResponse.JSONRPCError
# Now:         io.modelcontextprotocol.spec.jsonrpc.*
# ---------------------------------------------------------------------------
type: specs.openrewrite.org/v1beta/recipe
name: io.modelcontextprotocol.sdk.migrations.MigrateJsonRpcTypes
displayName: Migrate McpSchema JSON-RPC nested types to io.modelcontextprotocol.spec.jsonrpc
description: >
  Moves JSONRPCMessage, JSONRPCRequest, JSONRPCNotification, JSONRPCResponse,
  and the nested JSONRPCError from McpSchema to the
  io.modelcontextprotocol.spec.jsonrpc package.
tags:
  - mcp
  - migration
recipeList:
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.modelcontextprotocol.spec.McpSchema.JSONRPCMessage
      newFullyQualifiedTypeName: io.modelcontextprotocol.spec.jsonrpc.JSONRPCMessage
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.modelcontextprotocol.spec.McpSchema.JSONRPCRequest
      newFullyQualifiedTypeName: io.modelcontextprotocol.spec.jsonrpc.JSONRPCRequest
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.modelcontextprotocol.spec.McpSchema.JSONRPCNotification
      newFullyQualifiedTypeName: io.modelcontextprotocol.spec.jsonrpc.JSONRPCNotification
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.modelcontextprotocol.spec.McpSchema.JSONRPCResponse
      newFullyQualifiedTypeName: io.modelcontextprotocol.spec.jsonrpc.JSONRPCResponse
  # JSONRPCError is still nested inside JSONRPCResponse – only the outer class moved.
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.modelcontextprotocol.spec.McpSchema.JSONRPCResponse.JSONRPCError
      newFullyQualifiedTypeName: io.modelcontextprotocol.spec.jsonrpc.JSONRPCResponse.JSONRPCError

