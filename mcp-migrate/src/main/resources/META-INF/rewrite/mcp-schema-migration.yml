# ---------------------------------------------------------------------------
# Static member migrations
#
# McpSchema.JSONRPC_VERSION          -> JSONRPC.JSONRPC_VERSION
# McpSchema.deserializeJsonRpcMessage -> JSONRPC.deserializeJsonRpcMessage
# ---------------------------------------------------------------------------
type: specs.openrewrite.org/v1beta/recipe
name: io.modelcontextprotocol.sdk.migrations.MigrateStaticMembers
displayName: Migrate McpSchema static members to JSONRPC utility class
description: >
  The JSONRPC_VERSION string constant and the deserializeJsonRpcMessage utility
  method were moved from McpSchema to the new JSONRPC utility class in the
  io.modelcontextprotocol.spec.jsonrpc package.
tags:
  - mcp
  - migration
recipeList:
  # Constant: McpSchema.JSONRPC_VERSION -> JSONRPC.JSONRPC_VERSION
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      owningType: io.modelcontextprotocol.spec.McpSchema
      constantName: JSONRPC_VERSION
      newOwningType: io.modelcontextprotocol.spec.jsonrpc.JSONRPC
      newConstantName: JSONRPC_VERSION

  # Static method: McpSchema.deserializeJsonRpcMessage(...) -> JSONRPC.deserializeJsonRpcMessage(...)
  - org.openrewrite.java.ChangeMethodTargetToStatic:
      methodPattern: >-
        io.modelcontextprotocol.spec.McpSchema deserializeJsonRpcMessage(
        io.modelcontextprotocol.json.McpJsonMapper, String)
      fullyQualifiedTargetTypeName: io.modelcontextprotocol.spec.jsonrpc.JSONRPC
